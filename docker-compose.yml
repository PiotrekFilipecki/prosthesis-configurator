services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prosthesis-configurator:latest
    ports:
      - "8080:80"
    restart: unless-stopped

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: prosthesis-configurator:dev
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  node_modules:
